name: Daily Scrape

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python deps
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          cd scraper
          python -m playwright install chromium --with-deps

      - name: Run scraper
        run: |
          cd scraper
          python scrape.py --out ../docs/listings.json
        continue-on-error: true

      - name: Commit and push results
        run: |
          git config user.name "casatracker-bot"
          git config user.email "casatracker-bot@users.noreply.github.com"
          git add docs/listings.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🏠 Daily scrape $(date -u +'%Y-%m-%d')"
            git push
          fi
